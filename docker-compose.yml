services:
  step1189-server:
    build: .
    container_name: step1189-server
    expose:
      - "8080"

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - step1189-server
