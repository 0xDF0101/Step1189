
server {
	listen 80;

	location / {
		proxy_pass http://step1189-server:8080; # 컨테이너 이름을 써줘야 함
		proxy_set_header Host $http_host; # 포트번호까지 포함하려면 http_host, 포트번호를 떼고 백엔드로 전달하려면 host
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
}

