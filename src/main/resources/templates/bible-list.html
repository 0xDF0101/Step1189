<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Step 1189 | Bible Tracker</title>
    <style>
        :root {
            --green: #2ea44f;
            --red: #cf222e;
            --bg: #f4f5f8;
            --card: #ffffff;
            --text-primary: #171717;
            --text-secondary: #6b7280;
            --shadow-sm: 0 1px 6px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 16px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            margin: 0;
            padding: 16px 14px 90px;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 680px; margin: 0 auto; }

        h1 {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--green);
            margin: 4px 0 20px;
            letter-spacing: -0.5px;
        }

        .section-title {
            font-size: 0.72rem;
            color: var(--text-secondary);
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin: 0 0 14px;
        }

        /* 성경 카드 그리드 */
        .bible-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        @media (min-width: 520px) {
            .bible-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (min-width: 768px) {
            .bible-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 14px; }
        }

        .bible-card {
            background: var(--card);
            padding: 16px 12px 14px;
            border-radius: var(--radius);
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            box-shadow: var(--shadow-sm);
            -webkit-tap-highlight-color: transparent;
        }

        .bible-card:active { transform: scale(0.97); }
        @media (hover: hover) {
            .bible-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
        }

        .bible-name { font-weight: 700; font-size: 1rem; color: var(--text-primary); display: block; margin-bottom: 3px; }
        .bible-eng { font-size: 0.72rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }

        .level-0 { background-color: #ebedf0 !important; }
        .level-1 { background-color: #9be9a8 !important; }
        .level-2 { background-color: #40c463 !important; }
        .level-3 { background-color: #30a14e !important; }
        .level-4 { background-color: #216e39 !important; }

        /* 잔디 툴팁 */
        .grass-tooltip {
            visibility: hidden;
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            background: #171717;
            color: white;
            padding: 10px;
            border-radius: 12px;
            z-index: 100;
            width: 150px;
            box-shadow: var(--shadow-md);
            opacity: 0;
            transition: opacity 0.2s;
        }

        @media (hover: hover) {
            .bible-card:hover .grass-tooltip { visibility: visible; opacity: 1; }
        }

        @media (max-width: 767px) {
            .grass-tooltip {
                position: static;
                visibility: visible;
                opacity: 1;
                width: 100%;
                transform: none;
                box-shadow: none;
                background: transparent;
                padding: 8px 0 0;
                margin-top: 10px;
                border-top: 1px solid #f1f3f5;
            }
            .tooltip-text { display: none; }
        }

        .grass-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; margin-top: 6px; justify-items: center; }
        .grass-box { width: 9px; height: 9px; border-radius: 2px; }

        /* 모달 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 1000;
            justify-content: flex-end;
            align-items: flex-end;
        }

        .modal-content {
            background: var(--card);
            width: 100%;
            max-height: 88vh;
            border-radius: 24px 24px 0 0;
            padding: 24px 20px 32px;
            overflow-y: auto;
        }

        @media (min-width: 600px) {
            .modal-overlay { align-items: center; justify-content: center; }
            .modal-content { width: 90%; max-width: 520px; border-radius: 24px; max-height: 80vh; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .modal-title { font-size: 1.3rem; font-weight: 800; color: var(--green); letter-spacing: -0.3px; }

        .modal-close {
            background: #f4f5f8;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
        }

        /* 탭 */
        .modal-tabs {
            display: flex;
            margin-bottom: 18px;
            border-radius: 12px;
            overflow: hidden;
            background: #f4f5f8;
            padding: 3px;
            gap: 3px;
        }

        .tab-btn {
            flex: 1;
            padding: 9px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.88rem;
            color: var(--text-secondary);
            border-radius: 10px;
            transition: all 0.15s;
            font-family: inherit;
        }

        .tab-btn.active-record { background: var(--card); color: var(--green); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .tab-btn.active-cancel  { background: var(--card); color: var(--red);  box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

        /* 장 버튼 */
        .chapter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(56px, 1fr)); gap: 8px; }

        .chapter-btn {
            background: #f4f5f8;
            border: none;
            padding: 14px 0;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.92rem;
            font-weight: 700;
            transition: all 0.15s;
            font-family: inherit;
            color: var(--text-primary);
            -webkit-tap-highlight-color: transparent;
        }

        .chapter-btn:active:not(:disabled) { transform: scale(0.94); }
        .chapter-btn.selected { outline: 2.5px solid var(--green); outline-offset: 1px; background: #e8f8ed; }
        .chapter-btn.cancel-selected { outline: 2.5px solid var(--red); outline-offset: 1px; background: #fff0f0; }
        .chapter-btn:disabled { opacity: 0.28; cursor: not-allowed; }

        /* 확인 버튼 */
        .confirm-btn {
            display: block;
            width: 100%;
            margin-top: 18px;
            padding: 15px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: filter 0.15s, transform 0.1s;
            font-family: inherit;
        }

        .confirm-btn:active:not(:disabled) { transform: scale(0.98); }
        .confirm-btn:hover:not(:disabled) { filter: brightness(0.93); }
        .confirm-btn:disabled { background: #d1d5db; cursor: not-allowed; color: #9ca3af; }

        .active-modal { display: flex !important; }

        /* 하단 네비 */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--card);
            box-shadow: 0 -1px 0 rgba(0,0,0,0.06);
            display: flex;
            z-index: 200;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 11px 0 8px;
            text-decoration: none;
            color: #b0b8c1;
            font-size: 0.68rem;
            font-weight: 600;
            gap: 3px;
            transition: color 0.15s;
            letter-spacing: 0.2px;
        }

        .nav-item.active { color: var(--green); }
        .nav-item svg { width: 22px; height: 22px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Step 1189 🌿</h1>

    <div class="section-title">BIBLE LIST</div>
    <div class="bible-grid">
        <div th:each="bible : ${bibles}" class="bible-card"
             th:id="'bible-card-' + ${bible.id}"
             th:onclick="openModal([[${bible.id}]], [[${bible.korName}]], [[${bible.totalChapter}]])">
            <span class="bible-name" th:text="${bible.korName}"></span>
            <span class="bible-eng" th:text="${bible.engName}"></span>

            <div class="grass-tooltip">
                <span class="tooltip-text" th:text="${bible.korName} + ' Progress'"></span>
                <div class="grass-grid">
                    <div th:each="i : ${#numbers.sequence(1, bible.totalChapter)}"
                         class="grass-box level-0"
                         th:attr="data-chapter=${i}">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span id="modalBibleName" class="modal-title"></span>
            <button style="background:none; border:none; font-size:1.5rem; cursor:pointer;" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-tabs">
            <button class="tab-btn active-record" id="tabRecord" onclick="switchMode('record')">기록</button>
            <button class="tab-btn" id="tabCancel" onclick="switchMode('cancel')">취소</button>
        </div>
        <div id="chapterGrid" class="chapter-grid"></div>
        <button id="confirmBtn" class="confirm-btn" onclick="submitBatch()" disabled>확인</button>
    </div>
</div>

<script th:inline="javascript">
    const userProgress = [[${userProgress}]];
    const modalOverlay = document.getElementById('modalOverlay');
    const modalBibleName = document.getElementById('modalBibleName');
    const chapterGrid = document.getElementById('chapterGrid');
    const confirmBtn = document.getElementById('confirmBtn');

    let currentBibleId = null;
    let selectedChapters = new Set();
    let currentMode = 'record'; // 'record' | 'cancel'

    function getLevelClass(count) {
        if (!count || count === 0) return 'level-0';
        const c = parseInt(count);
        return c >= 4 ? 'level-4' : 'level-' + c;
    }

    function switchMode(mode) {
        currentMode = mode;
        selectedChapters.clear();
        confirmBtn.disabled = true;

        document.getElementById('tabRecord').className = 'tab-btn' + (mode === 'record' ? ' active-record' : '');
        document.getElementById('tabCancel').className = 'tab-btn' + (mode === 'cancel' ? ' active-cancel' : '');
        confirmBtn.style.background = mode === 'cancel' ? '#cf222e' : '#2ea44f';

        const bibleData = userProgress[currentBibleId.toString()] || {};
        chapterGrid.querySelectorAll('.chapter-btn').forEach(btn => {
            const count = parseInt(bibleData[btn.dataset.chapter] || 0);
            btn.className = 'chapter-btn ' + getLevelClass(count);
            btn.disabled = mode === 'cancel' && count === 0;
        });
    }

    function toggleChapter(chapter, btnElement) {
        if (btnElement.disabled) return;
        const selClass = currentMode === 'cancel' ? 'cancel-selected' : 'selected';

        if (selectedChapters.has(chapter)) {
            selectedChapters.delete(chapter);
            btnElement.classList.remove(selClass);
        } else {
            selectedChapters.add(chapter);
            btnElement.classList.add(selClass);
        }
        confirmBtn.disabled = selectedChapters.size === 0;
    }

    function submitBatch() {
        if (selectedChapters.size === 0) return;

        const isCancel = currentMode === 'cancel';
        const endpoint = isCancel ? '/api/v1/progress/batch/cancel' : '/api/v1/progress/batch';

        confirmBtn.disabled = true;
        confirmBtn.textContent = isCancel ? '취소 중...' : '저장 중...';

        fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ bibleId: currentBibleId, chapterNumbers: Array.from(selectedChapters) })
        }).then(res => {
            if (res.ok) {
                const bId = currentBibleId.toString();
                if (!userProgress[bId]) userProgress[bId] = {};

                selectedChapters.forEach(chapter => {
                    const cNum = chapter.toString();
                    const current = parseInt(userProgress[bId][cNum] || 0);
                    const nextCount = isCancel ? Math.max(0, current - 1) : current + 1;

                    if (nextCount === 0) delete userProgress[bId][cNum];
                    else userProgress[bId][cNum] = nextCount;

                    const btn = chapterGrid.querySelector(`[data-chapter="${chapter}"]`);
                    if (btn) {
                        btn.className = 'chapter-btn ' + getLevelClass(nextCount);
                        if (isCancel) btn.disabled = nextCount === 0;
                    }

                    const bibleCard = document.getElementById(`bible-card-${currentBibleId}`);
                    if (bibleCard) {
                        const grassBox = bibleCard.querySelector(`.grass-box[data-chapter="${chapter}"]`);
                        if (grassBox) grassBox.className = 'grass-box ' + getLevelClass(nextCount);
                    }
                });

                selectedChapters.clear();
                confirmBtn.textContent = '확인';
                confirmBtn.disabled = true;
            } else {
                confirmBtn.disabled = false;
                confirmBtn.textContent = '확인';
                alert('처리에 실패했습니다. 다시 시도해주세요.');
            }
        }).catch(() => {
            confirmBtn.disabled = false;
            confirmBtn.textContent = '확인';
            alert('처리에 실패했습니다. 다시 시도해주세요.');
        });
    }

    function initGrass() {
        document.querySelectorAll('.bible-card').forEach(card => {
            const bibleId = card.id.replace('bible-card-', '');
            const bibleData = userProgress[bibleId] || {};
            card.querySelectorAll('.grass-box').forEach(box => {
                const count = parseInt(bibleData[box.dataset.chapter] || 0);
                box.className = 'grass-box ' + getLevelClass(count);
            });
        });
    }

    document.addEventListener('DOMContentLoaded', initGrass);

    function openModal(id, name, totalChapters) {
        currentBibleId = id;
        currentMode = 'record';
        selectedChapters.clear();

        document.getElementById('tabRecord').className = 'tab-btn active-record';
        document.getElementById('tabCancel').className = 'tab-btn';
        confirmBtn.disabled = true;
        confirmBtn.textContent = '확인';
        confirmBtn.style.background = '#2ea44f';

        modalBibleName.innerText = name;
        chapterGrid.innerHTML = '';
        const bibleData = userProgress[id.toString()] || {};
        for (let i = 1; i <= totalChapters; i++) {
            const btn = document.createElement('button');
            const count = parseInt(bibleData[i.toString()] || 0);
            btn.className = 'chapter-btn ' + getLevelClass(count);
            btn.dataset.chapter = i;
            btn.innerText = i;
            btn.onclick = () => toggleChapter(i, btn);
            chapterGrid.appendChild(btn);
        }
        modalOverlay.classList.add('active-modal');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        selectedChapters.clear();
        modalOverlay.classList.remove('active-modal');
        document.body.style.overflow = 'auto';
    }

</script>
<nav class="bottom-nav">
    <a href="/main" class="nav-item">

    <a href="/plan" class="nav-item">

            <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 9v7.5m-9-6h.008v.008H12V9.75zm0 3h.008v.008H12v-.008zm0 3h.008v.008H12v-.008zm-3 0h.008v.008H9v-.008zm6 0h.008v.008H15v-.008z" />

    </a>
</nav>
</body>
</html>
