<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Step 1189 | Bible Tracker</title>
    <style>
        /* (기존 CSS 그대로 유지) */
        body { font-family: 'Pretendard', sans-serif; background: #f8f9fa; color: #212529; margin: 0; padding: 40px 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { color: #2ea44f; text-align: center; font-weight: 800; margin-bottom: 50px; }
        .section-title { font-size: 1.2rem; color: #868e96; margin: 40px 0 20px; font-weight: 600; display: flex; align-items: center; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: #e9ecef; margin-left: 15px; }
        .bible-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; }
        .bible-card { background: white; padding: 20px; border-radius: 8px; text-align: center; cursor: pointer; transition: all 0.25s ease; position: relative; box-shadow: 0 4px 16px 0 rgba(0,0,0,0.04); border: 1px solid #f1f3f5; }
        .bible-card:hover { transform: translateY(-8px); box-shadow: 0 12px 20px 0 rgba(0,0,0,0.08); border-color: #2ea44f; }
        .bible-name { font-weight: 700; font-size: 1.1rem; color: #212529; display: block; margin-bottom: 5px;}
        .bible-eng { font-size: 0.85rem; color: #adb5bd; text-transform: uppercase; letter-spacing: 0.5px; }
        .level-0 { background-color: #ebedf0 !important; }
        .level-1 { background-color: #9be9a8 !important; color: #1b1f23 !important; }
        .level-2 { background-color: #40c463 !important; color: white !important; }
        .level-3 { background-color: #30a14e !important; color: white !important; }
        .level-4 { background-color: #216e39 !important; color: white !important; }
        .grass-tooltip { visibility: hidden; position: absolute; bottom: 115%; left: 50%; transform: translateX(-50%); background: #24292f; color: white; padding: 12px; border-radius: 8px; z-index: 100; width: 150px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); opacity: 0; transition: opacity 0.3s; }
        .bible-card:hover .grass-tooltip { visibility: visible; opacity: 1; }
        .grass-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; margin-top: 8px; }
        .grass-box { width: 10px; height: 10px; border-radius: 2px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(33, 37, 41, 0.6); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 550px; max-height: 80vh; border-radius: 16px; padding: 30px; position: relative; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #f1f3f5; padding-bottom: 15px; }
        .modal-title { font-size: 1.5rem; font-weight: 800; color: #2ea44f; }
        .chapter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 10px; }
        .chapter-btn { border: 1px solid #e9ecef; padding: 12px 0; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 600; transition: 0.2s; }
        .modal-tabs { display: flex; margin-bottom: 20px; border-radius: 8px; overflow: hidden; border: 1px solid #e9ecef; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: white; cursor: pointer; font-weight: 700; font-size: 0.9rem; color: #57606a; transition: 0.15s; }
        .tab-btn.active-record { background: #2ea44f; color: white; }
        .tab-btn.active-cancel { background: #cf222e; color: white; }
        .chapter-btn.selected { outline: 3px solid #2ea44f; outline-offset: 2px; }
        .chapter-btn.cancel-selected { outline: 3px solid #cf222e; outline-offset: 2px; }
        .chapter-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .confirm-btn { display: block; width: 100%; margin-top: 20px; padding: 14px; background: #2ea44f; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.2s; }
        .confirm-btn:hover:not(:disabled) { filter: brightness(0.9); }
        .confirm-btn:disabled { background: #adb5bd; cursor: not-allowed; }
        .active-modal { display: flex !important; }

        /* 1. 기본 컨테이너 여백 조정 */
        body {
            padding: 20px 15px 80px; /* 하단은 네비게이션 바 공간 확보 */
        }

        /* 2. 메인 그리드 조정 */
        .bible-grid {
            display: grid;
            /* 폰에서는 2열, 태블릿 이상에선 자동 채우기 */
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        @media (min-width: 768px) {
            .bible-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 20px;
            }
        }

        /* 3. 모바일에서 툴팁 대신 카드의 일부로 보여주기 (선택사항) */
        /* 모바일은 터치 기반이라 hover 툴팁이 불편해. 아예 보여주거나 터치 시 나오게 해야 해 */
        @media (max-width: 767px) {
            .grass-tooltip {
                position: static; /* 공중에 띄우지 않고 카드 안으로 넣기 */
                visibility: visible;
                opacity: 1;
                width: 100%;
                transform: none;
                box-shadow: none;
                background: transparent;
                padding: 5px 0 0 0;
                margin-top: 10px;
                border-top: 1px solid #f1f3f5;
            }
            .tooltip-text { display: none; } /* 모바일선 텍스트 생략 */
            .grass-grid {
                grid-template-columns: repeat(10, 1fr); /* 10개씩 정렬 */
                justify-items: center;
            }
            .grass-box {
                width: 8px; /* 폰에선 약간 작게 */
                height: 8px;
            }
        }

        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: white;
            border-top: 1px solid #e9ecef;
            display: flex;
            z-index: 200;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 0;
            text-decoration: none;
            color: #57606a;
            font-size: 0.72rem;
            font-weight: 600;
            gap: 3px;
            transition: color 0.15s;
        }
        .nav-item.active { color: #2ea44f; }
        .nav-item svg { width: 22px; height: 22px; }

        /* 4. 모달 창 최적화 */
        .modal-content {
            width: 95%; /* 폰에서는 거의 꽉 차게 */
            padding: 20px;
            max-height: 90vh; /* 조금 더 길게 써도 됨 */
        }

        .chapter-grid {
            /* 폰에서는 버튼을 좀 더 크게 해서 터치하기 편하게! */
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Step 1189 🌿</h1>

    <div class="section-title">BIBLE LIST</div>
    <div class="bible-grid">
        <div th:each="bible : ${bibles}" class="bible-card"
             th:id="'bible-card-' + ${bible.id}"
             th:onclick="openModal([[${bible.id}]], [[${bible.korName}]], [[${bible.totalChapter}]])">
            <span class="bible-name" th:text="${bible.korName}"></span>
            <span class="bible-eng" th:text="${bible.engName}"></span>

            <div class="grass-tooltip">
                <span class="tooltip-text" th:text="${bible.korName} + ' Progress'"></span>
                <div class="grass-grid">
                    <div th:each="i : ${#numbers.sequence(1, bible.totalChapter)}"
                         class="grass-box level-0"
                         th:attr="data-chapter=${i}">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span id="modalBibleName" class="modal-title"></span>
            <button style="background:none; border:none; font-size:1.5rem; cursor:pointer;" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-tabs">
            <button class="tab-btn active-record" id="tabRecord" onclick="switchMode('record')">기록</button>
            <button class="tab-btn" id="tabCancel" onclick="switchMode('cancel')">취소</button>
        </div>
        <div id="chapterGrid" class="chapter-grid"></div>
        <button id="confirmBtn" class="confirm-btn" onclick="submitBatch()" disabled>확인</button>
    </div>
</div>

<script th:inline="javascript">
    const userProgress = [[${userProgress}]];
    const modalOverlay = document.getElementById('modalOverlay');
    const modalBibleName = document.getElementById('modalBibleName');
    const chapterGrid = document.getElementById('chapterGrid');
    const confirmBtn = document.getElementById('confirmBtn');

    let currentBibleId = null;
    let selectedChapters = new Set();
    let currentMode = 'record'; // 'record' | 'cancel'

    function getLevelClass(count) {
        if (!count || count === 0) return 'level-0';
        const c = parseInt(count);
        return c >= 4 ? 'level-4' : 'level-' + c;
    }

    function switchMode(mode) {
        currentMode = mode;
        selectedChapters.clear();
        confirmBtn.disabled = true;

        document.getElementById('tabRecord').className = 'tab-btn' + (mode === 'record' ? ' active-record' : '');
        document.getElementById('tabCancel').className = 'tab-btn' + (mode === 'cancel' ? ' active-cancel' : '');
        confirmBtn.style.background = mode === 'cancel' ? '#cf222e' : '#2ea44f';

        const bibleData = userProgress[currentBibleId.toString()] || {};
        chapterGrid.querySelectorAll('.chapter-btn').forEach(btn => {
            const count = parseInt(bibleData[btn.dataset.chapter] || 0);
            btn.className = 'chapter-btn ' + getLevelClass(count);
            btn.disabled = mode === 'cancel' && count === 0;
        });
    }

    function toggleChapter(chapter, btnElement) {
        if (btnElement.disabled) return;
        const selClass = currentMode === 'cancel' ? 'cancel-selected' : 'selected';

        if (selectedChapters.has(chapter)) {
            selectedChapters.delete(chapter);
            btnElement.classList.remove(selClass);
        } else {
            selectedChapters.add(chapter);
            btnElement.classList.add(selClass);
        }
        confirmBtn.disabled = selectedChapters.size === 0;
    }

    function submitBatch() {
        if (selectedChapters.size === 0) return;

        const isCancel = currentMode === 'cancel';
        const endpoint = isCancel ? '/api/v1/progress/batch/cancel' : '/api/v1/progress/batch';

        confirmBtn.disabled = true;
        confirmBtn.textContent = isCancel ? '취소 중...' : '저장 중...';

        fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ bibleId: currentBibleId, chapterNumbers: Array.from(selectedChapters) })
        }).then(res => {
            if (res.ok) {
                const bId = currentBibleId.toString();
                if (!userProgress[bId]) userProgress[bId] = {};

                selectedChapters.forEach(chapter => {
                    const cNum = chapter.toString();
                    const current = parseInt(userProgress[bId][cNum] || 0);
                    const nextCount = isCancel ? Math.max(0, current - 1) : current + 1;

                    if (nextCount === 0) delete userProgress[bId][cNum];
                    else userProgress[bId][cNum] = nextCount;

                    const btn = chapterGrid.querySelector(`[data-chapter="${chapter}"]`);
                    if (btn) {
                        btn.className = 'chapter-btn ' + getLevelClass(nextCount);
                        if (isCancel) btn.disabled = nextCount === 0;
                    }

                    const bibleCard = document.getElementById(`bible-card-${currentBibleId}`);
                    if (bibleCard) {
                        const grassBox = bibleCard.querySelector(`.grass-box[data-chapter="${chapter}"]`);
                        if (grassBox) grassBox.className = 'grass-box ' + getLevelClass(nextCount);
                    }
                });

                selectedChapters.clear();
                confirmBtn.textContent = '확인';
                confirmBtn.disabled = true;
            } else {
                confirmBtn.disabled = false;
                confirmBtn.textContent = '확인';
                alert('처리에 실패했습니다. 다시 시도해주세요.');
            }
        }).catch(() => {
            confirmBtn.disabled = false;
            confirmBtn.textContent = '확인';
            alert('처리에 실패했습니다. 다시 시도해주세요.');
        });
    }

    function initGrass() {
        document.querySelectorAll('.bible-card').forEach(card => {
            const bibleId = card.id.replace('bible-card-', '');
            const bibleData = userProgress[bibleId] || {};
            card.querySelectorAll('.grass-box').forEach(box => {
                const count = parseInt(bibleData[box.dataset.chapter] || 0);
                box.className = 'grass-box ' + getLevelClass(count);
            });
        });
    }

    document.addEventListener('DOMContentLoaded', initGrass);

    function openModal(id, name, totalChapters) {
        currentBibleId = id;
        currentMode = 'record';
        selectedChapters.clear();

        document.getElementById('tabRecord').className = 'tab-btn active-record';
        document.getElementById('tabCancel').className = 'tab-btn';
        confirmBtn.disabled = true;
        confirmBtn.textContent = '확인';
        confirmBtn.style.background = '#2ea44f';

        modalBibleName.innerText = name;
        chapterGrid.innerHTML = '';
        const bibleData = userProgress[id.toString()] || {};
        for (let i = 1; i <= totalChapters; i++) {
            const btn = document.createElement('button');
            const count = parseInt(bibleData[i.toString()] || 0);
            btn.className = 'chapter-btn ' + getLevelClass(count);
            btn.dataset.chapter = i;
            btn.innerText = i;
            btn.onclick = () => toggleChapter(i, btn);
            chapterGrid.appendChild(btn);
        }
        modalOverlay.classList.add('active-modal');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        selectedChapters.clear();
        modalOverlay.classList.remove('active-modal');
        document.body.style.overflow = 'auto';
    }

</script>
<nav class="bottom-nav">
    <a href="/main" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">

    <a href="/bibles" class="nav-item active">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.966 8.966 0 00-6 2.292m0-14.25v14.25" />
        </svg>
        성경
    </a>
</nav>
</body>
</html>
