<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 1189 | Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --green: #2ea44f;
            --green-light: #f0faf4;
            --color-level-0: #ebedf0;
            --color-level-1: #9be9a8;
            --color-level-2: #40c463;
            --color-level-3: #30a14e;
            --color-level-4: #216e39;
            --bg: #f4f5f8;
            --card: #ffffff;
            --text-primary: #171717;
            --text-secondary: #6b7280;
            --shadow-sm: 0 1px 6px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.07);
            --radius: 16px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .navbar {
            background: var(--bg);
            padding: 1.1rem 1.5rem 0.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--green);
            text-decoration: none;
            letter-spacing: -0.3px;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 16px 16px 90px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding: 20px;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
        }

        .avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #34d058, var(--green));
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.4rem;
            font-weight: 800;
            flex-shrink: 0;
        }

        .welcome-text h2 { margin: 0; font-size: 1.15rem; font-weight: 700; letter-spacing: -0.3px; }
        .welcome-text p { margin: 3px 0 0; color: var(--text-secondary); font-size: 0.85rem; }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .stat-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .chart-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            padding: 16px 10px 14px;
            text-align: center;
        }

        .chart-title {
            font-size: 0.72rem;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 0.3px;
        }

        .chart-wrapper {
            position: relative;
            width: 90px;
            height: 90px;
            margin: 0 auto;
        }

        .chart-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
        }

        .chart-pct {
            font-size: 1rem;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1;
        }

        .chart-sub {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 8px;
            line-height: 1.4;
        }

        .stat-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            padding: 18px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-label {
            font-size: 0.72rem;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .stat-value {
            font-size: 1.9rem;
            font-weight: 800;
            color: var(--green);
            letter-spacing: -1px;
            line-height: 1;
        }

        .stat-value-unit {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-left: 2px;
            letter-spacing: 0;
        }

        /* 잔디 */
        .contribution-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            padding: 20px;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 14px;
            letter-spacing: 0.3px;
        }

        .grass-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 6px;
        }

        .grass-wrapper::-webkit-scrollbar { height: 3px; }
        .grass-wrapper::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }

        .grass-graph {
            display: grid;
            grid-auto-flow: column;
            grid-template-rows: repeat(7, 13px);
            grid-auto-columns: 13px;
            gap: 3px;
        }

        .day {
            width: 13px;
            height: 13px;
            border-radius: 3px;
            background-color: var(--color-level-0);
            position: relative;
            transition: transform 0.1s;
        }

        .day:hover { transform: scale(1.3); }

        .day:hover::after {
            content: attr(data-info);
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #171717;
            color: white;
            padding: 5px 9px;
            border-radius: 8px;
            font-size: 11px;
            white-space: nowrap;
            z-index: 10;
            font-weight: 500;
        }

        .level-1 { background-color: var(--color-level-1); }
        .level-2 { background-color: var(--color-level-2); }
        .level-3 { background-color: var(--color-level-3); }
        .level-4 { background-color: var(--color-level-4); }

        .legend {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 10px;
        }

        .legend-box { width: 10px; height: 10px; border-radius: 3px; }

        /* 하단 네비 */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--card);
            box-shadow: 0 -1px 0 rgba(0,0,0,0.06);
            display: flex;
            z-index: 200;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 11px 0 8px;
            text-decoration: none;
            color: #b0b8c1;
            font-size: 0.68rem;
            font-weight: 600;
            gap: 3px;
            transition: color 0.15s;
            letter-spacing: 0.2px;
        }

        .nav-item.active { color: var(--green); }
        .nav-item svg { width: 22px; height: 22px; }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="#" class="logo">Step 1189 🌿</a>
    <div class="nav-links">
        <a href="/bibles" style="text-decoration:none; color: #57606a; font-weight:600;">성경 읽기표</a>
        <a href="/search" style="text-decoration:none; color: #57606a; font-weight:600; margin-left: 12px;">친구 찾기</a>
    </div>
</nav>

<div class="container">
    <div class="profile-header">
        <div class="avatar" id="mainAvatar">?</div>
        <div class="welcome-text">
            <h2 id="mainGreeting">안녕하세요!</h2>
            <p>오늘도 말씀과 함께 한 걸음 더 나아가세요.</p>
        </div>
    </div>

    <div class="stats-grid">
        <div class="chart-card">
            <div class="chart-title">총 진도</div>
            <div class="chart-wrapper">
                <canvas id="totalChart"></canvas>
                <div class="chart-center"><div class="chart-pct" id="totalPct">-</div></div>
            </div>
            <div class="chart-sub" id="totalSub">- / 1,189장</div>
        </div>
        <div class="chart-card">
            <div class="chart-title">구약</div>
            <div class="chart-wrapper">
                <canvas id="otChart"></canvas>
                <div class="chart-center"><div class="chart-pct" id="otPct">-</div></div>
            </div>
            <div class="chart-sub" id="otSub">-</div>
        </div>
        <div class="chart-card">
            <div class="chart-title">신약</div>
            <div class="chart-wrapper">
                <canvas id="ntChart"></canvas>
                <div class="chart-center"><div class="chart-pct" id="ntPct">-</div></div>
            </div>
            <div class="chart-sub" id="ntSub">-</div>
        </div>
    </div>
    <div class="stat-row-2">
        <div class="stat-card">
            <div class="stat-label">오늘 읽은 장</div>
            <div class="stat-value" id="todayCount">-<span class="stat-value-unit">장</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">연속 읽기</div>
            <div class="stat-value" id="streak">-<span class="stat-value-unit">일</span></div>
        </div>
    </div>

    <div class="contribution-card">
        <div class="card-title">1,189장을 향한 기록 (최근 1년)</div>
        <div class="grass-wrapper">
            <div id="grassGraph" class="grass-graph">
            </div>
        </div>
        <div class="legend">
            <span>Less</span>
            <div class="legend-box" style="background: var(--color-level-0);"></div>
            <div class="legend-box level-1"></div>
            <div class="legend-box level-2"></div>
            <div class="legend-box level-3"></div>
            <div class="legend-box level-4"></div>
            <span>More</span>
        </div>
    </div>
</div>

<script>
    async function initMain() {
        try {
            const [grassRes, statsRes, userRes] = await Promise.all([
                fetch('/api/v1/main', { headers: { 'Accept': 'application/json' } }),
                fetch('/api/v1/stats', { headers: { 'Accept': 'application/json' } }),
                fetch('/api/v1/settings/me', { headers: { 'Accept': 'application/json' } })
            ]);

            const grassData = await grassRes.json();
            const stats = await statsRes.json();

            renderGrass(grassData);
            renderStats(stats);

            if (userRes.ok) {
                const user = await userRes.json();
                const name = user.displayName || user.username;
                document.getElementById('mainGreeting').textContent = `안녕하세요, ${name}님!`;
                document.getElementById('mainAvatar').textContent = name.charAt(0).toUpperCase();
            }
        } catch (error) {
            console.error("데이터 로드 실패:", error);
            renderGrass({});
        }
    }

    function renderStats(s) {
        const pct = (r, t) => t > 0 ? (r / t * 100).toFixed(1) + '%' : '0%';

        makeDoughnut('totalChart', s.totalRead, s.totalChapters);
        document.getElementById('totalPct').textContent = pct(s.totalRead, s.totalChapters);
        document.getElementById('totalSub').textContent = `${s.totalRead.toLocaleString()} / ${s.totalChapters.toLocaleString()}장`;

        makeDoughnut('otChart', s.oldTestamentRead, s.oldTestamentTotal);
        document.getElementById('otPct').textContent = pct(s.oldTestamentRead, s.oldTestamentTotal);
        document.getElementById('otSub').textContent = `${s.oldTestamentRead} / ${s.oldTestamentTotal}장`;

        makeDoughnut('ntChart', s.newTestamentRead, s.newTestamentTotal);
        document.getElementById('ntPct').textContent = pct(s.newTestamentRead, s.newTestamentTotal);
        document.getElementById('ntSub').textContent = `${s.newTestamentRead} / ${s.newTestamentTotal}장`;

        document.getElementById('todayCount').innerHTML = `${s.todayCount}<span class="stat-value-unit">장</span>`;
        document.getElementById('streak').innerHTML = `${s.streak}<span class="stat-value-unit">일</span>`;
    }

    function makeDoughnut(canvasId, read, total) {
        new Chart(document.getElementById(canvasId), {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [read, total - read],
                    backgroundColor: ['#2ea44f', '#ebedf0'],
                    borderWidth: 0,
                    hoverOffset: 0,
                }]
            },
            options: {
                cutout: '72%',
                animation: { duration: 800 },
                plugins: { legend: { display: false }, tooltip: { enabled: false } },
            }
        });
    }

    function renderGrass(data) {
        const graph = document.getElementById('grassGraph');
        graph.innerHTML = '';

        const today = new Date();
        const startDate = new Date();
        startDate.setFullYear(today.getFullYear() - 1);

        // 깃허브처럼 일요일부터 시작하도록 정렬 (0: 일, 1: 월...)
        const startDay = startDate.getDay();
        startDate.setDate(startDate.getDate() - startDay);

        // 오늘까지 날짜 루프 돌면서 칸 생성
        let currentDate = new Date(startDate);
        while (currentDate <= today) {
            const dateStr = currentDate.toISOString().split('T')[0];
            const count = data[dateStr] || 0;

            const dayEl = document.createElement('div');
            dayEl.className = 'day ' + getLevelClass(count);
            dayEl.setAttribute('data-info', `${dateStr}: ${count}장 읽음`);

            graph.appendChild(dayEl);
            currentDate.setDate(currentDate.getDate() + 1);

            const wrapper = document.querySelector('.grass-wrapper');
            wrapper.scrollLeft = wrapper.scrollWidth;
        }

    }

    function getLevelClass(count) {
        if (count === 0) return '';
        if (count <= 1) return 'level-1';
        if (count <= 5) return 'level-2';
        if (count <= 9) return 'level-3';
        return 'level-4';
    }

    initMain();
</script>
