<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 1189 | Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --color-level-0: #ebedf0;
            --color-level-1: #9be9a8;
            --color-level-2: #40c463;
            --color-level-3: #30a14e;
            --color-level-4: #216e39;
            --primary-green: #2ea44f;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f8f9fa;
            color: #24292f;
            margin: 0;
            padding: 0;
        }

        .navbar {
            background: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 0 rgba(27,31,35,0.04);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-green);
            text-decoration: none;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px 80px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: var(--primary-green);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2rem;
            font-weight: bold;
        }

        .welcome-text h2 { margin: 0; font-size: 1.8rem; }
        .welcome-text p { margin: 5px 0 0; color: #57606a; }

        /* --- 잔디 그래프 스타일 --- */
        .contribution-card {
            background: white;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 20px;
            margin-top: 20px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .grass-wrapper {
            overflow-x: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .grass-graph {
            display: grid;
            /* 💡 grid-template-flow 대신 아래 두 줄을 사용해! */
            grid-auto-flow: column;     /* 열(Column) 방향으로 데이터를 채움 */
            grid-template-rows: repeat(7, 12px); /* 7행(요일) 고정 */

            grid-auto-columns: 12px;
            gap: 3px;
        }

        .day {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            background-color: var(--color-level-0);
            position: relative;
        }

        /* 툴팁 효과 */
        .day:hover::after {
            content: attr(data-info);
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #24292f;
            color: white;
            padding: 5px 8px;
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
            z-index: 10;
        }

        .level-1 { background-color: var(--color-level-1); }
        .level-2 { background-color: var(--color-level-2); }
        .level-3 { background-color: var(--color-level-3); }
        .level-4 { background-color: var(--color-level-4); }

        .legend {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #57606a;
            margin-top: 10px;
        }

        .legend-box { width: 10px; height: 10px; border-radius: 2px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr) repeat(2, minmax(120px, 160px));
            gap: 15px;
            margin-top: 20px;
            align-items: stretch;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .stat-card { grid-column: span 1; }
        }

        .chart-card {
            background: white;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 16px 12px 12px;
            text-align: center;
        }

        .chart-title {
            font-size: 0.78rem;
            color: #57606a;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .chart-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto;
        }

        .chart-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
        }

        .chart-pct {
            font-size: 1.15rem;
            font-weight: 800;
            color: #24292f;
            line-height: 1;
        }

        .chart-sub {
            font-size: 0.75rem;
            color: #57606a;
            margin-top: 8px;
        }

        .stat-card {
            background: white;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-label {
            font-size: 0.78rem;
            color: #57606a;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--primary-green);
        }

        .stat-value-unit {
            font-size: 0.9rem;
            font-weight: 600;
            color: #57606a;
            margin-left: 2px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: white;
            border-top: 1px solid #d0d7de;
            display: flex;
            z-index: 200;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 0;
            text-decoration: none;
            color: #57606a;
            font-size: 0.72rem;
            font-weight: 600;
            gap: 3px;
            transition: color 0.15s;
        }
        .nav-item.active { color: var(--primary-green); }
        .nav-item svg { width: 22px; height: 22px; }

        /* --- 메인 대시보드 모바일 최적화 --- */
        @media (max-width: 768px) {
            .container {
                margin: 20px auto;
                padding: 0 15px;
            }

            .profile-header {
                flex-direction: column; /* 아바타와 텍스트를 세로로 */
                text-align: center;
                gap: 10px;
            }

            .avatar {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
            }

            .welcome-text h2 {
                font-size: 1.4rem;
            }

            /* 잔디 그래프 카드 설정 */
            .contribution-card {
                padding: 15px;
                overflow: hidden; /* 카드가 삐져나가지 않게 */
            }

            .grass-wrapper {
                /* 💡 모바일에서는 옆으로 슥슥 밀어서 볼 수 있게! */
                overflow-x: auto;
                padding-bottom: 10px;
                -webkit-overflow-scrolling: touch; /* 아이폰 스크롤 부드럽게 */
            }

            /* 스크롤바 디자인 (있어야 사용자가 밀 수 있다는 걸 알아!) */
            .grass-wrapper::-webkit-scrollbar {
                height: 4px;
            }
            .grass-wrapper::-webkit-scrollbar-thumb {
                background: #d0d7de;
                border-radius: 10px;
            }

            .grass-graph {
                /* 칸을 모바일 터치에 맞게 살짝 키워도 좋아 */
                grid-template-rows: repeat(7, 14px);
                grid-auto-columns: 14px;
                gap: 4px;
            }

            .day {
                width: 14px;
                height: 14px;
            }

            /* 모바일에서는 툴팁이 터치 시 잠시 보이게 하거나,
               터치가 불편하면 아예 클릭 시 아래에 날짜가 뜨게 하는 방식이 좋지만
               우선은 스크롤에 집중하자! */
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="#" class="logo">Step 1189 🌿</a>
    <div class="nav-links">
        <a href="/bibles" style="text-decoration:none; color: #57606a; font-weight:600;">성경 읽기표</a>
    </div>
</nav>

<div class="container">
    <div class="profile-header">
        <div class="avatar">U</div>
        <div class="welcome-text">
            <h2>안녕하세요, 유진님!</h2>
            <p>오늘도 말씀과 함께 한 걸음 더 나아가세요.</p>
        </div>
    </div>

    <div class="stats-grid">
        <div class="chart-card">
            <div class="chart-title">총 진도</div>
            <div class="chart-wrapper">
                <canvas id="totalChart"></canvas>
                <div class="chart-center"><div class="chart-pct" id="totalPct">-</div></div>
            </div>
            <div class="chart-sub" id="totalSub">- / 1,189장</div>
        </div>
        <div class="chart-card">
            <div class="chart-title">구약</div>
            <div class="chart-wrapper">
                <canvas id="otChart"></canvas>
                <div class="chart-center"><div class="chart-pct" id="otPct">-</div></div>
            </div>
            <div class="chart-sub" id="otSub">-</div>
        </div>
        <div class="chart-card">
            <div class="chart-title">신약</div>
            <div class="chart-wrapper">
                <canvas id="ntChart"></canvas>
                <div class="chart-center"><div class="chart-pct" id="ntPct">-</div></div>
            </div>
            <div class="chart-sub" id="ntSub">-</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">오늘 읽은 장</div>
            <div class="stat-value" id="todayCount">-<span class="stat-value-unit">장</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">연속 읽기</div>
            <div class="stat-value" id="streak">-<span class="stat-value-unit">일</span></div>
        </div>
    </div>

    <div class="contribution-card">
        <div class="card-title">1,189장을 향한 기록 (최근 1년)</div>
        <div class="grass-wrapper">
            <div id="grassGraph" class="grass-graph">
            </div>
        </div>
        <div class="legend">
            <span>Less</span>
            <div class="legend-box" style="background: var(--color-level-0);"></div>
            <div class="legend-box level-1"></div>
            <div class="legend-box level-2"></div>
            <div class="legend-box level-3"></div>
            <div class="legend-box level-4"></div>
            <span>More</span>
        </div>
    </div>
</div>

<script>
    async function initMain() {
        try {
            const [grassRes, statsRes] = await Promise.all([
                fetch('/api/v1/main', { headers: { 'Accept': 'application/json' } }),
                fetch('/api/v1/stats', { headers: { 'Accept': 'application/json' } })
            ]);

            const grassData = await grassRes.json();
            const stats = await statsRes.json();

            renderGrass(grassData);
            renderStats(stats);
        } catch (error) {
            console.error("데이터 로드 실패:", error);
            renderGrass({});
        }
    }

    function renderStats(s) {
        const pct = (r, t) => t > 0 ? (r / t * 100).toFixed(1) + '%' : '0%';

        makeDoughnut('totalChart', s.totalRead, s.totalChapters);
        document.getElementById('totalPct').textContent = pct(s.totalRead, s.totalChapters);
        document.getElementById('totalSub').textContent = `${s.totalRead.toLocaleString()} / ${s.totalChapters.toLocaleString()}장`;

        makeDoughnut('otChart', s.oldTestamentRead, s.oldTestamentTotal);
        document.getElementById('otPct').textContent = pct(s.oldTestamentRead, s.oldTestamentTotal);
        document.getElementById('otSub').textContent = `${s.oldTestamentRead} / ${s.oldTestamentTotal}장`;

        makeDoughnut('ntChart', s.newTestamentRead, s.newTestamentTotal);
        document.getElementById('ntPct').textContent = pct(s.newTestamentRead, s.newTestamentTotal);
        document.getElementById('ntSub').textContent = `${s.newTestamentRead} / ${s.newTestamentTotal}장`;

        document.getElementById('todayCount').innerHTML = `${s.todayCount}<span class="stat-value-unit">장</span>`;
        document.getElementById('streak').innerHTML = `${s.streak}<span class="stat-value-unit">일</span>`;
    }

    function makeDoughnut(canvasId, read, total) {
        new Chart(document.getElementById(canvasId), {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [read, total - read],
                    backgroundColor: ['#2ea44f', '#ebedf0'],
                    borderWidth: 0,
                    hoverOffset: 0,
                }]
            },
            options: {
                cutout: '72%',
                animation: { duration: 800 },
                plugins: { legend: { display: false }, tooltip: { enabled: false } },
            }
        });
    }

    function renderGrass(data) {
        const graph = document.getElementById('grassGraph');
        graph.innerHTML = '';

        const today = new Date();
        const startDate = new Date();
        startDate.setFullYear(today.getFullYear() - 1);

        // 깃허브처럼 일요일부터 시작하도록 정렬 (0: 일, 1: 월...)
        const startDay = startDate.getDay();
        startDate.setDate(startDate.getDate() - startDay);

        // 오늘까지 날짜 루프 돌면서 칸 생성
        let currentDate = new Date(startDate);
        while (currentDate <= today) {
            const dateStr = currentDate.toISOString().split('T')[0];
            const count = data[dateStr] || 0;

            const dayEl = document.createElement('div');
            dayEl.className = 'day ' + getLevelClass(count);
            dayEl.setAttribute('data-info', `${dateStr}: ${count}장 읽음`);

            graph.appendChild(dayEl);
            currentDate.setDate(currentDate.getDate() + 1);

            const wrapper = document.querySelector('.grass-wrapper');
            wrapper.scrollLeft = wrapper.scrollWidth;
        }

    }

    function getLevelClass(count) {
        if (count === 0) return '';
        if (count <= 1) return 'level-1';
        if (count <= 5) return 'level-2';
        if (count <= 9) return 'level-3';
        return 'level-4';
    }

    initMain();
</script>

        </svg>

    </a>
</nav>
</body>
</html>
