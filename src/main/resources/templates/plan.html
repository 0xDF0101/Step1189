<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 1189 | 읽기 계획</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --green: #2ea44f;
            --green-light: #e8f5ec;
            --red: #e53e3e;
            --red-light: #fff5f5;
            --text: #1a1a2e;
            --text-secondary: #8e8e93;
            --bg: #f4f5f8;
            --card: #ffffff;
            --radius: 16px;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --shadow-sm: 0 1px 4px rgba(0,0,0,0.04);
        }

        * { box-sizing: border-box; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0 0 calc(70px + env(safe-area-inset-bottom)); -webkit-font-smoothing: antialiased; }

        /* ── 헤더 ── */
        .top-bar { background: var(--card); padding: 16px 20px; display: flex; align-items: center; box-shadow: var(--shadow-sm); }
        .top-bar-title { font-size: 1.1rem; font-weight: 700; color: var(--text); }
        .logo-dot { color: var(--green); }

        /* ── 컨테이너 ── */
        .container { max-width: 600px; margin: 0 auto; padding: 20px 16px; }

        /* ── 섹션 제목 ── */
        .section-title { font-size: 1.4rem; font-weight: 800; color: var(--text); margin: 0 0 4px; }
        .section-desc { font-size: 0.9rem; color: var(--text-secondary); margin: 0 0 20px; }

        /* ── 카드 ── */
        .card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 12px; }

        /* ── 폼 ── */
        .form-group { margin-bottom: 14px; }
        .form-label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; letter-spacing: 0.02em; }
        .form-input {
            width: 100%; padding: 13px 14px;
            border: 1.5px solid #e5e5ea;
            border-radius: 12px;
            font-size: 0.95rem; font-family: inherit;
            background: var(--bg); color: var(--text);
            transition: border-color 0.15s;
        }
        .form-input:focus { outline: none; border-color: var(--green); background: #fff; }

        /* ── 미리보기 박스 ── */
        .preview-box {
            background: var(--green-light); border-radius: 12px;
            padding: 16px; margin: 16px 0; display: none;
        }
        .preview-label { font-size: 0.78rem; font-weight: 600; color: var(--green); margin-bottom: 4px; letter-spacing: 0.03em; }
        .preview-value { font-size: 2rem; font-weight: 800; color: var(--green); line-height: 1; }
        .preview-sub { font-size: 0.82rem; color: #3a7d52; margin-top: 4px; }

        /* ── 버튼 ── */
        .btn-primary {
            display: block; width: 100%; padding: 15px;
            background: var(--green); color: white; border: none;
            border-radius: 14px; font-size: 1rem; font-weight: 700;
            cursor: pointer; font-family: inherit;
            transition: filter 0.15s, transform 0.1s;
        }
        .btn-primary:hover { filter: brightness(0.92); }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { background: #c7c7cc; cursor: not-allowed; }

        .btn-secondary {
            display: block; width: 100%; padding: 13px;
            background: var(--bg); color: var(--text-secondary); border: none;
            border-radius: 14px; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; font-family: inherit; margin-top: 8px;
            transition: background 0.15s, color 0.15s;
        }
        .btn-secondary:hover { background: #e9e9ef; color: var(--text); }

        .btn-danger {
            display: block; width: 100%; padding: 13px;
            background: var(--red-light); color: var(--red); border: none;
            border-radius: 14px; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; font-family: inherit; margin-top: 8px;
            transition: filter 0.15s;
        }
        .btn-danger:hover { filter: brightness(0.95); }

        /* ── 계획 헤더 ── */
        .plan-period-label { font-size: 0.82rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
        .plan-headline { font-size: 1.5rem; font-weight: 800; margin-bottom: 16px; }
        .plan-headline span { color: var(--green); }

        /* ── 진도 바 ── */
        .progress-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
        .progress-title { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); }
        .progress-count { font-size: 0.9rem; font-weight: 700; color: var(--text); }
        .progress-bar { height: 8px; background: #e5e5ea; border-radius: 99px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--green); border-radius: 99px; transition: width 0.9s cubic-bezier(0.4,0,0.2,1); width: 0%; }

        /* ── 통계 박스 ── */
        .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
        .stat-box { background: var(--card); border-radius: var(--radius); padding: 14px 10px; box-shadow: var(--shadow); text-align: center; }
        .stat-box-label { font-size: 0.7rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; letter-spacing: 0.03em; }
        .stat-box-value { font-size: 1.3rem; font-weight: 800; color: var(--text); line-height: 1; }
        .stat-box-unit { font-size: 0.75rem; font-weight: 500; color: var(--text-secondary); margin-left: 1px; }

        /* ── 페이스 카드 ── */
        .pace-card {
            border-radius: var(--radius); padding: 18px 20px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--shadow);
        }
        .pace-card.on-track { background: var(--green-light); }
        .pace-card.behind { background: var(--red-light); }
        .pace-label { font-size: 0.9rem; font-weight: 700; }
        .pace-label.on-track { color: var(--green); }
        .pace-label.behind { color: var(--red); }
        .pace-detail { font-size: 0.8rem; color: var(--text-secondary); margin-top: 3px; }
        .pace-adj { text-align: right; }
        .pace-adj-label { font-size: 0.72rem; color: var(--text-secondary); margin-bottom: 2px; }
        .pace-adj-value { font-size: 1.3rem; font-weight: 800; }
        .pace-adj-value.on-track { color: var(--green); }
        .pace-adj-value.behind { color: var(--red); }

        /* ── 하단 네비 ── */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--card);
            box-shadow: 0 -1px 0 rgba(0,0,0,0.06), 0 -4px 16px rgba(0,0,0,0.05);
            display: flex; z-index: 200;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 10px 0; text-decoration: none;
            color: var(--text-secondary); font-size: 0.7rem; font-weight: 600;
            gap: 3px; transition: color 0.15s;
        }
        .nav-item.active { color: var(--green); }
        .nav-item svg { width: 22px; height: 22px; }
    </style>
</head>
<body>

<header class="top-bar">
    <span class="top-bar-title">Step 1189 <span class="logo-dot">·</span> 읽기 계획</span>
</header>

<div class="container">

    <!-- 계획 없음: 설정 폼 -->
    <div id="setupView" style="display:none;">
        <div class="section-title">읽기 계획 세우기</div>
        <div class="section-desc">기간을 설정하면 하루 목표와 페이스를 알려드려요.</div>

        <div class="card">
            <div class="form-group">
                <label class="form-label">시작일</label>
                <input type="date" id="startDate" class="form-input">
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label">종료일</label>
                <input type="date" id="endDate" class="form-input">
            </div>

            <div id="previewBox" class="preview-box">
                <div class="preview-label">하루 목표</div>
                <div class="preview-value" id="previewDaily">-</div>
                <div class="preview-sub" id="previewSub"></div>
            </div>

            <button class="btn-primary" id="savePlanBtn" onclick="savePlan()" disabled>계획 시작</button>
        </div>
    </div>

    <!-- 계획 있음: 통계 -->
    <div id="statsView" style="display:none;">
        <div class="plan-period-label" id="planPeriod"></div>
        <div class="plan-headline">하루 <span id="targetPerDay">-</span>장씩 읽는 계획</div>

        <div class="card">
            <div class="progress-header">
                <span class="progress-title">전체 진도</span>
                <span class="progress-count"><span id="chaptersRead">-</span> / 1,189장 &nbsp;<span id="pctDisplay" style="color:var(--green);">-</span></span>
            </div>
            <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        </div>

        <div class="stat-row">
            <div class="stat-box">
                <div class="stat-box-label">총 기간</div>
                <div class="stat-box-value" id="totalDays">-<span class="stat-box-unit">일</span></div>
            </div>
            <div class="stat-box">
                <div class="stat-box-label">경과</div>
                <div class="stat-box-value" id="daysElapsed">-<span class="stat-box-unit">일</span></div>
            </div>
            <div class="stat-box">
                <div class="stat-box-label">남은 날</div>
                <div class="stat-box-value" id="daysRemaining">-<span class="stat-box-unit">일</span></div>
            </div>
        </div>

        <div id="paceCard" class="pace-card">
            <div>
                <div id="paceLabel" class="pace-label"></div>
                <div id="paceDetail" class="pace-detail"></div>
            </div>
            <div class="pace-adj">
                <div class="pace-adj-label">조정 목표</div>
                <div id="adjTarget" class="pace-adj-value">-장/일</div>
            </div>
        </div>

        <button class="btn-secondary" onclick="showSetup()">계획 변경</button>
        <button class="btn-danger" onclick="deletePlan()">계획 삭제</button>
    </div>

</div>

<script>
    const startInput = document.getElementById('startDate');
    const endInput = document.getElementById('endDate');
    const savePlanBtn = document.getElementById('savePlanBtn');

    // 시작일 기본값: 오늘
    startInput.value = new Date().toISOString().split('T')[0];

    [startInput, endInput].forEach(el => el.addEventListener('change', updatePreview));

    function updatePreview() {
        const s = new Date(startInput.value);
        const e = new Date(endInput.value);
        if (!startInput.value || !endInput.value || e <= s) {
            document.getElementById('previewBox').style.display = 'none';
            savePlanBtn.disabled = true;
            return;
        }
        const days = Math.round((e - s) / 86400000) + 1;
        const perDay = Math.ceil(1189 / days);
        document.getElementById('previewDaily').textContent = perDay + '장';
        document.getElementById('previewSub').textContent = `총 ${days}일 계획 · 1,189장 완독`;
        document.getElementById('previewBox').style.display = 'block';
        savePlanBtn.disabled = false;
    }

    function savePlan() {
        savePlanBtn.disabled = true;
        savePlanBtn.textContent = '저장 중...';
        fetch('/api/v1/plan', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ startDate: startInput.value, endDate: endInput.value })
        }).then(res => {
            if (res.ok) loadPlan();
            else { savePlanBtn.disabled = false; savePlanBtn.textContent = '계획 시작'; alert('저장 실패'); }
        });
    }

    function showSetup() {
        document.getElementById('statsView').style.display = 'none';
        document.getElementById('setupView').style.display = 'block';
        savePlanBtn.textContent = '계획 시작';
        updatePreview();
    }

    function renderStats(s) {
        document.getElementById('setupView').style.display = 'none';
        document.getElementById('statsView').style.display = 'block';

        const fmt = d => d.replace(/-/g, '.');
        document.getElementById('planPeriod').textContent = `${fmt(s.startDate)} ~ ${fmt(s.endDate)}`;
        document.getElementById('targetPerDay').textContent = s.targetPerDay;
        document.getElementById('chaptersRead').textContent = s.chaptersReadInPeriod;
        document.getElementById('pctDisplay').textContent = s.percentComplete.toFixed(1) + '%';
        document.getElementById('progressFill').style.width = Math.min(100, s.percentComplete).toFixed(1) + '%';

        document.getElementById('totalDays').innerHTML = `${s.totalDays}<span class="stat-box-unit">일</span>`;
        document.getElementById('daysElapsed').innerHTML = `${s.daysElapsed}<span class="stat-box-unit">일</span>`;
        document.getElementById('daysRemaining').innerHTML = `${s.daysRemaining}<span class="stat-box-unit">일</span>`;

        const paceCard = document.getElementById('paceCard');
        const paceLabel = document.getElementById('paceLabel');
        const paceDetail = document.getElementById('paceDetail');
        const adjTarget = document.getElementById('adjTarget');
        const diff = s.chaptersReadInPeriod - s.expectedByNow;

        if (s.onTrack) {
            paceCard.className = 'pace-card on-track';
            paceLabel.className = 'pace-label on-track';
            paceLabel.textContent = '페이스 유지 중';
            paceDetail.textContent = `목표보다 ${diff}장 앞서가고 있어요`;
            adjTarget.className = 'pace-adj-value on-track';
        } else {
            paceCard.className = 'pace-card behind';
            paceLabel.className = 'pace-label behind';
            paceLabel.textContent = '페이스 뒤처짐';
            paceDetail.textContent = `목표보다 ${Math.abs(diff)}장 부족해요`;
            adjTarget.className = 'pace-adj-value behind';
        }
        adjTarget.textContent = `${s.adjustedDailyTarget}장/일`;
    }

    function deletePlan() {
        if (!confirm('계획을 삭제할까요?')) return;
        fetch('/api/v1/plan', { method: 'DELETE' }).then(res => {
            if (res.ok) {
                document.getElementById('statsView').style.display = 'none';
                startInput.value = new Date().toISOString().split('T')[0];
                endInput.value = '';
                document.getElementById('previewBox').style.display = 'none';
                savePlanBtn.disabled = true;
                savePlanBtn.textContent = '계획 시작';
                document.getElementById('setupView').style.display = 'block';
            }
        });
    }

    async function loadPlan() {
        const res = await fetch('/api/v1/plan');
        if (res.status === 204) {
            document.getElementById('setupView').style.display = 'block';
        } else {
            renderStats(await res.json());
        }
    }

    loadPlan();
</script>

</body>
