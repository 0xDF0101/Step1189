<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Step 1189 - 표시 이름 설정</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
        body { background: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .container {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            background: #fff;
            padding: 48px 24px 40px;
            display: flex;
            flex-direction: column;
        }

        .step-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 40px;
        }
        .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #e9ecef; }
        .step-dot.done { background: #2ea44f; }
        .step-dot.active { background: #2ea44f; width: 24px; border-radius: 4px; }

        .logo { font-size: 1rem; font-weight: 700; color: #2ea44f; margin-bottom: 32px; }

        h1 { font-size: 1.5rem; font-weight: 800; color: #212529; line-height: 1.4; margin-bottom: 8px; word-break: keep-all; }
        .subtitle { font-size: 0.9rem; color: #868e96; margin-bottom: 36px; line-height: 1.5; word-break: keep-all; }

        .form-group { margin-bottom: 8px; }
        label { display: block; font-size: 0.83rem; font-weight: 600; color: #495057; margin-bottom: 8px; }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            font-size: 1rem;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            outline: none;
            transition: all 0.2s;
            color: #212529;
        }
        input[type="text"]:focus { border-color: #2ea44f; background: #f0fff4; }
        input[type="text"]::placeholder { color: #adb5bd; }

        .hint { font-size: 0.78rem; color: #adb5bd; margin-top: 8px; padding-left: 2px; line-height: 1.5; }
        .error-msg { font-size: 0.78rem; color: #fa5252; margin-top: 6px; padding-left: 2px; min-height: 18px; }

        .btn-continue {
            width: 100%;
            padding: 17px;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            background: #2ea44f;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: auto;
            box-shadow: 0 4px 12px rgba(46,164,79,0.2);
        }
        .btn-continue:hover { background: #269044; }
        .btn-continue:active { transform: scale(0.98); }
    </style>
</head>
<body>
<div class="container">
    <div class="step-indicator">
        <div class="step-dot done"></div>
        <div class="step-dot active"></div>
    </div>

    <p class="logo">Step 1189 🌿</p>
    <h1>어떻게 불릴까요?</h1>
    <p class="subtitle">다른 사용자에게 보여지는 이름이에요.<br>한글, 영문 상관없이 자유롭게 설정하세요.</p>

    <div class="form-group">
        <label for="displayName">표시 이름</label>
        <input type="text" id="displayName" name="displayName" placeholder="예: 유진, Eugene, 말씀읽는이" required autocomplete="off" maxlength="20">
        <p class="hint">2~20자, 제한 없이 자유롭게 설정 가능해요</p>
        <p class="error-msg" id="displayName-error"></p>
    </div>

    <button class="btn-continue" onclick="submit()">시작하기 🌿</button>
</div>

<script>
    async function submit() {
        const displayName = document.getElementById('displayName').value.trim();
        const errorEl = document.getElementById('displayName-error');
        errorEl.textContent = '';

        if (displayName.length < 2) {
            errorEl.textContent = '표시 이름은 2자 이상이어야 합니다.';
            return;
        }

        const params = new URLSearchParams();
        params.append('displayName', displayName);

        const res = await fetch('/api/v1/users/display-name', { method: 'POST', body: params });

        if (res.ok) {
            window.location.href = '/main';
        } else {
            const errors = await res.json();
            errorEl.textContent = errors[0]?.message || '다시 시도해주세요.';
        }
    }
</script>
</body>
</html>
