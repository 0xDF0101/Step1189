<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Step 1189 - 아이디 설정</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
        body { background: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .container {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            background: #fff;
            padding: 48px 24px 40px;
            display: flex;
            flex-direction: column;
        }

        .step-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 40px;
        }
        .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #e9ecef; }
        .step-dot.active { background: #2ea44f; width: 24px; border-radius: 4px; }

        .logo { font-size: 1rem; font-weight: 700; color: #2ea44f; margin-bottom: 32px; }

        h1 { font-size: 1.5rem; font-weight: 800; color: #212529; line-height: 1.4; margin-bottom: 8px; word-break: keep-all; }
        .subtitle { font-size: 0.9rem; color: #868e96; margin-bottom: 36px; line-height: 1.5; word-break: keep-all; }

        .form-group { margin-bottom: 8px; }
        label { display: block; font-size: 0.83rem; font-weight: 600; color: #495057; margin-bottom: 8px; }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            font-size: 1rem;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            outline: none;
            transition: all 0.2s;
            color: #212529;
        }
        input[type="text"]:focus { border-color: #2ea44f; background: #f0fff4; }
        input[type="text"]::placeholder { color: #adb5bd; }

        .hint { font-size: 0.78rem; color: #adb5bd; margin-top: 8px; padding-left: 2px; line-height: 1.5; }
        .error-msg { font-size: 0.78rem; color: #fa5252; margin-top: 6px; padding-left: 2px; min-height: 18px; }

        .btn-continue {
            width: 100%;
            padding: 17px;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            background: #2ea44f;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: auto;
            box-shadow: 0 4px 12px rgba(46,164,79,0.2);
        }
        .btn-continue:hover { background: #269044; }
        .btn-continue:active { transform: scale(0.98); }
    </style>
</head>
<body>
<div class="container">
    <div class="step-indicator">
        <div class="step-dot active"></div>
        <div class="step-dot"></div>
    </div>

    <p class="logo">Step 1189 🌿</p>
    <h1>사용할 아이디를<br>입력해주세요</h1>
    <p class="subtitle">로그인 시 사용되는 아이디예요.<br>영문, 숫자, -, _를 사용할 수 있습니다.</p>

    <div class="form-group">
        <label for="username">아이디 (@username)</label>
        <input type="text" id="username" name="username" placeholder="my_username" required autocomplete="off" maxlength="20">
        <p class="hint">4~20자, 영문·숫자·하이픈(-)·언더바(_)만 가능</p>
        <p class="error-msg" id="username-error"></p>
    </div>

    <button class="btn-continue" onclick="submit()">다음으로</button>
</div>

<script>
    const usernameInput = document.getElementById('username');

    usernameInput.addEventListener('input', () => {
        usernameInput.value = usernameInput.value.replace(/[^a-zA-Z0-9_-]/g, '');
        document.getElementById('username-error').textContent = '';
    });

    async function submit() {
        const username = usernameInput.value.trim();
        const errorEl = document.getElementById('username-error');
        errorEl.textContent = '';

        if (username.length < 4) {
            errorEl.textContent = '아이디는 4자 이상이어야 합니다.';
            return;
        }

        const params = new URLSearchParams();
        params.append('username', username);

        const res = await fetch('/api/v1/users/username', { method: 'POST', body: params });

        if (res.ok) {
            window.location.href = '/signup/set-display-name';
        } else {
            const errors = await res.json();
            errorEl.textContent = errors[0]?.message || '사용할 수 없는 아이디입니다.';
        }
    }
</script>
</body>
</html>
