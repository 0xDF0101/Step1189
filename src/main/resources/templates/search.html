<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 1189 | 사용자 검색</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --green: #2ea44f;
            --green-light: #f0faf4;
            --bg: #f4f5f8;
            --card: #ffffff;
            --text-primary: #171717;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --shadow-sm: 0 1px 6px rgba(0,0,0,0.05);
            --radius: 16px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .navbar {
            background: var(--bg);
            padding: 1.1rem 1.5rem 0.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--green);
            text-decoration: none;
            letter-spacing: -0.3px;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 8px 16px 90px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 8px 0;
        }

        .page-title {
            font-size: 1.2rem;
            font-weight: 800;
            margin: 0;
        }

        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: 'Pretendard', sans-serif;
            color: var(--text-primary);
            background: #fafafa;
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus { border-color: var(--green); background: #fff; }

        .btn {
            padding: 9px 16px;
            border: none;
            border-radius: 10px;
            font-size: 0.88rem;
            font-weight: 600;
            font-family: 'Pretendard', sans-serif;
            cursor: pointer;
            transition: opacity 0.15s;
            white-space: nowrap;
        }

        .btn:active { opacity: 0.8; }
        .btn-primary { background: var(--green); color: #fff; }
        .btn-secondary { background: var(--card); color: var(--text-primary); border: 1.5px solid var(--border); }

        .user-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            padding: 16px 20px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--green);
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .user-info { flex: 1; min-width: 0; }
        .user-display-name { font-size: 1rem; font-weight: 700; }
        .user-username { font-size: 0.85rem; color: var(--text-secondary); }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-secondary);
        }

        .empty-state p { font-size: 0.95rem; margin: 8px 0 24px; }

        /* Bottom nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 max(8px, env(safe-area-inset-bottom));
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 4px 10px;
            transition: color 0.15s;
        }

        .nav-item.active { color: var(--green); }
        .nav-item svg { width: 22px; height: 22px; }
    </style>
</head>
<body>

<div class="navbar">
    <a href="/main" class="logo">Step 1189</a>
</div>

<div class="container">
    <div class="page-header">
        <h2 class="page-title">사용자 검색</h2>
        <a href="/follows" class="btn btn-secondary" style="text-decoration:none;">팔로우 목록</a>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="아이디(@handle) 또는 이름으로 검색">
        <button class="btn btn-primary" onclick="search()">검색</button>
    </div>

    <div id="resultList">
        <div class="empty-state"><p>아이디나 이름으로 다른 사용자를 찾아보세요</p></div>
    </div>
</div>

<script>
    async function search() {
        const q = document.getElementById('searchInput').value.trim();
        const container = document.getElementById('resultList');
        if (!q) {
            container.innerHTML = `<div class="empty-state"><p>아이디나 이름으로 다른 사용자를 찾아보세요</p></div>`;
            return;
        }

        const res = await fetch(`/api/v1/users/search?q=${encodeURIComponent(q)}`, {
            headers: { 'Accept': 'application/json' }
        });
        if (!res.ok) return;
        const users = await res.json();
        renderResults(users);
    }

    function renderResults(users) {
        const container = document.getElementById('resultList');
        if (users.length === 0) {
            container.innerHTML = `<div class="empty-state"><p>검색 결과가 없습니다</p></div>`;
            return;
        }
        container.innerHTML = users.map(u => `
            <div class="user-card">
                <div class="user-avatar">${escHtml(u.displayName || u.username).charAt(0).toUpperCase()}</div>
                <div class="user-info">
                    <div class="user-display-name">${escHtml(u.displayName || u.username)}</div>
                    <div class="user-username">@${escHtml(u.username)}</div>
                </div>
                ${u.followedByMe
                    ? `<button class="btn btn-secondary" onclick="unfollow(${u.userId}, this)">팔로잉</button>`
                    : `<button class="btn btn-primary" onclick="follow(${u.userId}, this)">팔로우</button>`}
            </div>
        `).join('');
    }

    async function follow(targetUserId, btn) {
        const res = await fetch(`/api/v1/follows/${targetUserId}`, { method: 'POST' });
        if (res.ok) {
            btn.textContent = '팔로잉';
            btn.classList.remove('btn-primary');
            btn.classList.add('btn-secondary');
            btn.setAttribute('onclick', `unfollow(${targetUserId}, this)`);
        }
    }

    async function unfollow(targetUserId, btn) {
        const res = await fetch(`/api/v1/follows/${targetUserId}`, { method: 'DELETE' });
        if (res.ok) {
            btn.textContent = '팔로우';
            btn.classList.remove('btn-secondary');
            btn.classList.add('btn-primary');
            btn.setAttribute('onclick', `follow(${targetUserId}, this)`);
        }
    }

    function escHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    document.getElementById('searchInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') search();
    });
</script>
</body>
</html>
