<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 1189 | 설정</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --green: #2ea44f;
            --green-light: #f0faf4;
            --bg: #f4f5f8;
            --card: #ffffff;
            --text-primary: #171717;
            --text-secondary: #6b7280;
            --text-danger: #ef4444;
            --border: #e5e7eb;
            --shadow-sm: 0 1px 6px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.07);
            --radius: 16px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .navbar {
            background: var(--bg);
            padding: 1.1rem 1.5rem 0.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--green);
            text-decoration: none;
            letter-spacing: -0.3px;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 16px 16px 90px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Profile card */
        .profile-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            padding: 28px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--green);
            color: #fff;
            font-size: 1.4rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .profile-info { flex: 1; }

        .profile-name {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0 0 4px;
            color: var(--text-primary);
        }

        .profile-email {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin: 0 0 8px;
        }

        .badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            background: var(--green-light);
            color: var(--green);
        }

        .badge.social { background: #eff6ff; color: #3b82f6; }

        /* Section card */
        .section-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            padding: 24px;
        }

        .section-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0 0 16px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: 'Pretendard', sans-serif;
            color: var(--text-primary);
            background: #fafafa;
            transition: border-color 0.15s;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--green);
            background: #fff;
        }

        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Pretendard', sans-serif;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .btn:active { opacity: 0.85; }

        .btn-primary {
            background: var(--green);
            color: #fff;
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--text-primary);
            border: 1.5px solid var(--border);
        }

        .btn-danger {
            background: #fef2f2;
            color: var(--text-danger);
            border: 1.5px solid #fecaca;
        }

        .msg {
            font-size: 0.83rem;
            margin: 8px 0 0;
            min-height: 18px;
        }

        .msg.success { color: var(--green); }
        .msg.error { color: var(--text-danger); }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 16px 0;
        }

        /* Bottom nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 max(8px, env(safe-area-inset-bottom));
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 4px 16px;
            transition: color 0.15s;
        }

        .nav-item.active { color: var(--green); }
        .nav-item svg { width: 22px; height: 22px; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .modal-overlay.visible { display: flex; }

        .modal {
            background: var(--card);
            border-radius: var(--radius);
            padding: 28px 24px;
            width: 100%;
            max-width: 360px;
        }

        .modal-title {
            font-size: 1.05rem;
            font-weight: 700;
            margin: 0 0 10px;
        }

        .modal-desc {
            font-size: 0.88rem;
            color: var(--text-secondary);
            margin: 0 0 24px;
            line-height: 1.5;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-actions .btn { margin: 0; }
    </style>
</head>
<body>

<div class="navbar">
    <a href="/main" class="logo">Step 1189</a>
</div>

<div class="container">

    <!-- 프로필 카드 -->
    <div class="profile-card">
        <div class="avatar" id="avatarInitial">?</div>
        <div class="profile-info">
            <p class="profile-name" id="profileName">로딩 중...</p>
            <p class="profile-email" id="profileEmail"></p>
            <span class="badge" id="loginBadge"></span>
        </div>
    </div>

    <!-- 닉네임 변경 -->
    <div class="section-card">
        <div class="section-title">닉네임 변경</div>
        <div class="input-group">
            <input type="text" id="newUsername" placeholder="새 닉네임 (4~20자)" maxlength="20">
        </div>
        <button class="btn btn-primary" onclick="changeUsername()">변경하기</button>
        <p class="msg" id="usernameMsg"></p>
    </div>

    <!-- 비밀번호 변경 (로컬 계정만) -->
    <div class="section-card" id="passwordSection" style="display:none;">
        <div class="section-title">비밀번호 변경</div>
        <div class="input-group">
            <input type="password" id="currentPassword" placeholder="현재 비밀번호">
            <input type="password" id="newPassword" placeholder="새 비밀번호 (8자 이상)">
            <input type="password" id="confirmPassword" placeholder="새 비밀번호 확인">
        </div>
        <button class="btn btn-primary" onclick="changePassword()">변경하기</button>
        <p class="msg" id="passwordMsg"></p>
    </div>

    <!-- 계정 관리 -->
    <div class="section-card">
        <div class="section-title">계정 관리</div>
        <button class="btn btn-secondary" onclick="logout()">로그아웃</button>
        <div class="divider"></div>
        <button class="btn btn-danger" onclick="showDeleteModal()">회원 탈퇴</button>
    </div>

</div>

<!-- 탈퇴 확인 모달 -->
<div class="modal-overlay" id="deleteModal">
    <div class="modal">
        <p class="modal-title">정말 탈퇴하시겠습니까?</p>
        <p class="modal-desc">모든 성경 읽기 기록이 영구적으로 삭제되며, 이 작업은 되돌릴 수 없습니다.</p>
        <div class="modal-actions">
            <button class="btn btn-secondary" style="flex:1" onclick="closeDeleteModal()">취소</button>
            <button class="btn btn-danger" style="flex:1" onclick="deleteAccount()">탈퇴</button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <a href="/main" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955a1.126 1.126 0 011.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75" />
        </svg>
        홈
    </a>
    <a href="/bibles" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.966 8.966 0 00-6 2.292m0-14.25v14.25" />

    <a href="/groups" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z" />

<script>
    async function loadUserInfo() {
        const res = await fetch('/api/v1/settings/me', { headers: { 'Accept': 'application/json' } });
        if (!res.ok) return;
        const user = await res.json();

        document.getElementById('avatarInitial').textContent = user.nickname.charAt(0).toUpperCase();
        document.getElementById('profileName').textContent = user.nickname;
        document.getElementById('profileEmail').textContent = user.email;

        const badge = document.getElementById('loginBadge');
        if (user.socialType && user.socialType !== 'local') {
            badge.textContent = 'Google 계정';
            badge.className = 'badge social';
        } else {
            badge.textContent = '일반 계정';
            badge.className = 'badge';
            document.getElementById('passwordSection').style.display = 'block';
        }
    }

    function setMsg(id, text, isSuccess) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = 'msg ' + (isSuccess ? 'success' : 'error');
    }

    async function changeUsername() {
        const username = document.getElementById('newUsername').value.trim();
        setMsg('usernameMsg', '', true);

        const res = await fetch('/api/v1/settings/username', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username })
        });

        if (res.ok) {
            setMsg('usernameMsg', '닉네임이 변경되었습니다.', true);
            document.getElementById('profileName').textContent = username;
            document.getElementById('avatarInitial').textContent = username.charAt(0).toUpperCase();
            document.getElementById('newUsername').value = '';
        } else {
            const errors = await res.json();
            setMsg('usernameMsg', errors[0]?.message || '변경에 실패했습니다.', false);
        }
    }

    async function changePassword() {
        const currentPassword = document.getElementById('currentPassword').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        setMsg('passwordMsg', '', true);

        if (newPassword !== confirmPassword) {
            setMsg('passwordMsg', '새 비밀번호가 일치하지 않습니다.', false);
            return;
        }

        const res = await fetch('/api/v1/settings/password', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ currentPassword, newPassword })
        });

        if (res.ok) {
            setMsg('passwordMsg', '비밀번호가 변경되었습니다.', true);
            document.getElementById('currentPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        } else {
            const errors = await res.json();
            setMsg('passwordMsg', errors[0]?.message || '변경에 실패했습니다.', false);
        }
    }

    async function logout() {
        await fetch('/logout', { method: 'POST' });
        window.location.href = '/login';
    }

    function showDeleteModal() {
        document.getElementById('deleteModal').classList.add('visible');
    }

    function closeDeleteModal() {
        document.getElementById('deleteModal').classList.remove('visible');
    }

    async function deleteAccount() {
        const res = await fetch('/api/v1/settings/account', { method: 'DELETE' });
        if (res.ok) {
            window.location.href = '/login';
        }
    }

    loadUserInfo();
</script>
</body>
</html>
