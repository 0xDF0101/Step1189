name: Deploy to Home Server

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

#  jdk set up과 build jar는 멀티 스테이지 빌드라서 굳이 안해도 됨
#      - name: Set up JDK 21
#        uses: actions/setup-java@v4
#        with:
#          java-version: '21'
#          distribution: 'temurin'
#          cache: 'maven'

#      - name: Build JAR
#        run: mvn package -DskipTests -q && cp target/*.jar app.jar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # github 측에서 자동 생성

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/0xdf0101/step1189:latest

      - name: Debug secret length
        run: echo "length=${#SSH_KEY}, lines=$(echo "$SSH_KEY" | wc -l)"
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Debug secret hash
        run: printf '%s' "$SSH_KEY" | shasum -a 256
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT}}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: '10m'
          script: |
            set -e
            export PATH="/usr/local/bin:/opt/homebrew/bin:$PATH"
            export DOCKER_HOST="unix:///Users/server-admin/.colima/default/docker.sock"
            # 이전 배포 프로세스 잔재 정리
            # pkill -f "docker compose" || true
            sleep 2
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            docker compose pull
            docker compose up -d
            echo "✅ 배포 완료"
      
      
      
      
